<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 – Page Not Found</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap"/>
  <style>
    :root{--primary:#0a2540;--accent:#00d4ff;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--primary);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;overflow:hidden;}
    .bg{position:fixed;inset:0;background:radial-gradient(circle at 20% 50%,rgba(0,212,255,0.07),transparent 50%),radial-gradient(circle at 80% 20%,rgba(26,115,232,0.1),transparent 40%);}
    .content{position:relative;z-index:1;}
    .num{font-family:'Playfair Display',serif;font-size:clamp(6rem,20vw,12rem);font-weight:700;color:transparent;-webkit-text-stroke:2px rgba(255,255,255,0.15);line-height:1;letter-spacing:-0.04em;}
    .num span{color:var(--accent);-webkit-text-stroke:0;}
    h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2.5rem);color:#fff;margin:16px 0;}
    p{color:rgba(255,255,255,0.6);font-size:1rem;max-width:400px;margin:0 auto 40px;}
    a{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#1a73e8,var(--accent));color:#fff;padding:14px 36px;border-radius:99px;font-weight:600;text-decoration:none;transition:transform .3s,box-shadow .3s;box-shadow:0 8px 24px rgba(26,115,232,0.4);}
    a:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(26,115,232,0.5);}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <div class="num">4<span>0</span>4</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
