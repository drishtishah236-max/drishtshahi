services:
  - type: web
    name: harshil-portfolio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: portfolio-uploads
      mountPath: /opt/render/project/src/static/uploads
      sizeGB: 1
